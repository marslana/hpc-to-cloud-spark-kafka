#!/bin/bash
# experiment.conf — Shared configuration for all pipeline experiments
# Source this file in every experiment script: source configs/experiment.conf

# ─── EC2 Instances ───────────────────────────────────────────
# UPDATE THESE after launching EC2 instances
EC2_US_EAST_IP="<YOUR_US_EAST_IP>"     # m5.8xlarge in us-east-1
EC2_FRANKFURT_IP="<YOUR_FRANKFURT_IP>" # m5.8xlarge in eu-central-1 (Approaches 4,5)
EC2_USER="ubuntu"
EC2_KEY_US="$HOME/.ssh/ec2-us-east.pem"
EC2_KEY_FRA="$HOME/.ssh/ec2-frankfurt.pem"

# Kafka bootstrap servers (on EC2)
KAFKA_US_EAST="${EC2_US_EAST_IP}:9092"
KAFKA_FRANKFURT="${EC2_FRANKFURT_IP}:9092"

# ─── Dataset ─────────────────────────────────────────────────
DATASET_DIR="$HOME/pipeline_data"
DATASET_5GB="${DATASET_DIR}/eea_airquality_5gb.csv"
FILTER_RATIO=0.111   # ~11.1% of records pass filter

# Filter condition (used in Spark): keep only records from these countries
FILTER_COUNTRIES="LU,DE,BE"

# ─── Kafka Configuration (consistent across all approaches) ──
KAFKA_PARTITIONS=8
KAFKA_ACKS="1"
KAFKA_REPLICATION=1
KAFKA_BATCH_SIZE=16384       # 16KB
KAFKA_LINGER_MS=10
KAFKA_BUFFER_MEMORY=67108864 # 64MB

# ─── Spark Configuration ─────────────────────────────────────
SPARK_EXECUTOR_MEMORY="6g"
SPARK_DRIVER_MEMORY="2g"
SPARK_BATCH_SIZE="16384"     # 16KB for Spark kafka producer

# ─── Singularity ─────────────────────────────────────────────
SIF="$HOME/hsk.sif"
if [ ! -f "$SIF" ]; then
    SIF="$HOME/sparkhdfs.sif"
fi

# ─── Experiment Control ──────────────────────────────────────
NUM_RUNS=3                   # Repeat each experiment 3 times
RESULTS_BASE="$HOME/pipeline_results"

# ─── Helper Functions ────────────────────────────────────────
timestamp() { date +%Y%m%d_%H%M%S; }

log() { echo "[$(date '+%H:%M:%S')] $1"; }

ensure_topic() {
    local bootstrap=$1 topic=$2 partitions=$3
    singularity exec $SIF /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server "$bootstrap" --delete --topic "$topic" 2>/dev/null || true
    sleep 2
    singularity exec $SIF /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server "$bootstrap" --create --topic "$topic" \
        --partitions "$partitions" --replication-factor $KAFKA_REPLICATION \
        --config retention.ms=3600000 2>/dev/null
}

delete_topic() {
    local bootstrap=$1 topic=$2
    singularity exec $SIF /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server "$bootstrap" --delete --topic "$topic" 2>/dev/null || true
}

check_connectivity() {
    local host=$1 port=${2:-9092}
    log "Testing connectivity to ${host}:${port}..."
    singularity exec $SIF /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server "${host}:${port}" --list > /dev/null 2>&1 \
        && { log "OK — connected"; return 0; } \
        || { log "FAILED — cannot reach ${host}:${port}"; return 1; }
}
