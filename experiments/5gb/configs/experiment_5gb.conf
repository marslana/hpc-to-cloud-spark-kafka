#!/bin/bash
# experiment_5gb.conf — Shared configuration for 5GB pipeline experiments
# Source this file in every experiment script: source configs/experiment_5gb.conf

# ─── EC2 Instances ───────────────────────────────────────────
# UPDATE THESE after launching/starting EC2 instances
EC2_US_EAST_IP="<YOUR_US_EAST_IP>"      # m5.8xlarge in us-east-1
EC2_FRANKFURT_IP="<YOUR_FRANKFURT_IP>"  # m5.8xlarge in eu-central-1 (Approaches 4,5)
EC2_USER="ubuntu"

SSH_KEY_US="$HOME/.ssh/pipeline-useast-key.pem"
SSH_KEY_FRA="$HOME/.ssh/pipeline-frankfurt-key.pem"
SSH_OPTS_US="-o StrictHostKeyChecking=no -o ConnectTimeout=10 -i $SSH_KEY_US"
SSH_OPTS_FRA="-o StrictHostKeyChecking=no -o ConnectTimeout=10 -i $SSH_KEY_FRA"
SSH_OPTS="$SSH_OPTS_US"  # default to US-East key

KAFKA_US_EAST="${EC2_US_EAST_IP}:9092"
KAFKA_FRANKFURT="${EC2_FRANKFURT_IP}:9092"

# ─── Dataset ─────────────────────────────────────────────────
DATASET_DIR="$HOME/pipeline_data"
DATASET_5GB="${DATASET_DIR}/eea_airquality_5gb.csv"
FILTER_COUNTRIES="LU,DE,BE"
EXPECTED_FILTER_RATIO=0.111          # ~11.1%

# ─── Kafka Configuration (identical across all approaches) ───
KAFKA_PARTITIONS=8
KAFKA_ACKS="1"
KAFKA_REPLICATION=1
KAFKA_BATCH_SIZE="16384"             # 16KB (Spark Kafka producer)
KAFKA_LINGER_MS="10"
KAFKA_BUFFER_MEMORY="67108864"       # 64MB

# ─── Spark Configuration ─────────────────────────────────────
SPARK_EXECUTOR_MEMORY="6g"
SPARK_DRIVER_MEMORY="2g"
SPARK_WORKERS=2
SPARK_CORES_PER_WORKER=4

# ─── SkyHOST Configuration (Approach 5) ─────────────────────
SKYHOST_READERS=8
SKYHOST_WRITERS=8
SKYHOST_CHUNK_SIZE="33554432"        # 32MB

# ─── MM2 Configuration (Approach 4) ─────────────────────────
MM2_TASKS=8
MM2_BATCH_SIZE="1048576"             # 1MB
MM2_LINGER_MS="100"
MM2_INFLIGHT=10
MM2_ACKS="1"

# ─── Experiment Control ──────────────────────────────────────
NUM_RUNS=3
RESULTS_BASE="$HOME/5gb_results"

# ─── Consumer Configuration ──────────────────────────────────
# Target records: 5GB with ~11.1% filter ratio
# 5GB ≈ 83.9M records × 0.111 ≈ 9.3M filtered records
EXPECTED_FILTERED_RECORDS=9317527    # exact: 83886080 × 11.1%
CONSUMER_IDLE_TIMEOUT_MS=60000       # stop 60s after last record

# ─── Singularity ─────────────────────────────────────────────
SIF="$HOME/hsk.sif"
if [ ! -f "$SIF" ]; then SIF="$HOME/sparkhdfs.sif"; fi

# ─── Helper Functions ────────────────────────────────────────
timestamp() { date +%Y%m%d_%H%M%S; }
log() { echo "[$(date '+%H:%M:%S')] $1"; }

ensure_topic_remote() {
    local ec2_ip=$1 topic=$2 partitions=$3 ssh_opt="${4:-$SSH_OPTS_US}"
    ssh $ssh_opt ${EC2_USER}@${ec2_ip} "
        sudo docker exec kafka /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server localhost:9092 --delete --topic $topic 2>/dev/null || true
        sleep 2
        sudo docker exec kafka /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server localhost:9092 --create --topic $topic \
            --partitions $partitions --replication-factor 1 \
            --config retention.ms=7200000
    "
}

ensure_topic_local() {
    local bootstrap=$1 topic=$2 partitions=$3
    singularity exec $SIF /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server "$bootstrap" --delete --topic "$topic" 2>/dev/null || true
    sleep 2
    singularity exec $SIF /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server "$bootstrap" --create --topic "$topic" \
        --partitions "$partitions" --replication-factor 1 \
        --config retention.ms=7200000
}

delete_topic_remote() {
    local ec2_ip=$1 topic=$2 ssh_opt="${3:-$SSH_OPTS_US}"
    ssh $ssh_opt ${EC2_USER}@${ec2_ip} "
        sudo docker exec kafka /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server localhost:9092 --delete --topic $topic 2>/dev/null || true
    "
}

count_topic_remote() {
    local ec2_ip=$1 topic=$2 ssh_opt="${3:-$SSH_OPTS_US}"
    ssh $ssh_opt ${EC2_USER}@${ec2_ip} "
        sudo docker exec kafka /opt/kafka/bin/kafka-get-offsets.sh \
            --bootstrap-server localhost:9092 --topic $topic 2>/dev/null \
            | awk -F: '{sum+=\$3} END{print sum}'
    "
}
